name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short

    - name: Run tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: |
        pip install pytest-cov
        pytest tests/ --cov=src/codenav --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black ruff

    - name: Check formatting with black
      run: black --check src/ tests/

    - name: Lint with ruff
      run: ruff check src/ tests/

  # Verify core library works without MCP installed (critical for kmlp-mcp integration)
  test-core-no-mcp:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install core only (no extras)
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Verify core imports without MCP
      run: |
        python -c "
        from codenav import CodeNavigator, CodeSearcher, LineReader
        from codenav import TokenEfficientRenderer, ImportResolver
        from codenav import Symbol, SearchResult, compute_content_hash
        from codenav.mcp import MCP_AVAILABLE
        assert not MCP_AVAILABLE, 'MCP should not be available without [mcp] extra'
        print('Core imports OK without MCP installed')
        "

  # Validate Dart AST path with the pre-compiled grammar from the `dart` extra
  # (tree-sitter-dart) and run the Dart tests with TREE_SITTER_AVAILABLE=True.
  # The rest of the matrix already covers the regex-fallback path.
  dart-ast:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install codenav with the Dart grammar
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,dart]"

    - name: Verify Dart grammar loaded
      run: |
        python -c "
        from codenav.dart_analyzer import TREE_SITTER_AVAILABLE
        assert TREE_SITTER_AVAILABLE, 'Dart tree-sitter grammar failed to load'
        print('Dart AST grammar loaded OK')
        "

    - name: Run Dart analyzer tests (AST path)
      run: pytest tests/test_dart_analyzer.py -v --tb=short

  # Validate the ast-grep path from the `fast` extra (Java/C/C++/PHP upgrade
  # from regex to AST with parent linkage). The rest of the matrix runs without
  # ast-grep and covers the regex-fallback path.
  astgrep:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install codenav with the ast-grep extra
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,fast]"

    - name: Verify ast-grep loaded
      run: |
        python -c "
        from codenav.ast_grep_analyzer import is_ast_grep_available
        assert is_ast_grep_available(), 'ast-grep-py failed to load'
        print('ast-grep available OK')
        "

    - name: Run ast-grep wiring tests (AST path)
      run: pytest tests/test_ast_grep_wiring.py tests/test_coverage_stats.py -v --tb=short

  # Exercise the tree-sitter AST paths for JS/TS/Go/Rust/Dart (the default
  # matrix runs without these grammars and covers the regex fallback). This is
  # where call/dependency extraction is validated end to end.
  ast-langs:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install codenav with all tree-sitter grammars
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ast,dart]"

    - name: Run analyzer + call-extraction tests (AST path)
      run: |
        pytest tests/test_call_extraction.py tests/test_js_ts_analyzer.py \
          tests/test_go_analyzer.py tests/test_rust_analyzer.py \
          tests/test_ruby_analyzer.py tests/test_dart_analyzer.py -v --tb=short

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, test-core-no-mcp]
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload artifact
      # upload-artifact v4 is still the latest major (Node 20); no Node-24 release exists yet.
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: dist
        path: dist/
